<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento Seguro Auto BSMSP</title>
    <style>
        :root {
            --bg-main: #0B141A;
            --bg-chat: #0B141A;
            --bg-msg-bot: #202C33;
            --bg-msg-user: #005C4B;
            --bg-input: #202C33;
            --bg-header: #202C33;
            --bg-menu-btn: #2A3942;
            --bg-menu-hover: #3A4952;
            --color-green: #00A884;
            --color-text: #E9EDEF;
            --color-subtext: #8696A0;
            --color-link: #53BDEB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0a1014; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
        }

        .chat-container { 
            width: 100%; 
            max-width: 500px; 
            height: 90vh;
            background: var(--bg-main); 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
        }

        .menu-panel {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: var(--bg-msg-bot);
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            transition: bottom 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            max-height: 80%;
        }

        .menu-panel.open {
            bottom: 0;
        }

        .menu-panel-header {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--color-green);
            font-weight: bold;
        }

        .close-menu-btn {
            color: var(--color-subtext);
            cursor: pointer;
            font-size: 20px;
        }

        .menu-panel-content {
            overflow-y: auto;
            padding: 10px 15px;
        }

        .menu-option {
            background: var(--bg-menu-btn);
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            color: var(--color-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .menu-option:hover {
            background: var(--bg-menu-hover);
        }

        .menu-option-num {
            color: var(--color-green);
            font-weight: bold;
            width: 20px;
        }

        .chat-header { 
            background: var(--bg-header); 
            color: var(--color-text); 
            padding: 15px; 
            display: flex;
            align-items: center;
            font-weight: bold; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .chat-header .avatar {
            width: 42px;
            height: 42px;
            background-color: var(--bg-msg-user);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            font-size: 20px;
            border: 2px solid var(--color-green);
        }

        .chat-header .info {
            display: flex;
            flex-direction: column;
        }

        .chat-header .title {
            font-size: 15px;
        }

        .chat-header .verified {
            color: var(--color-link);
            font-size: 13px;
        }

        .chat-header .status {
            font-size: 13px;
            color: var(--color-green);
            font-weight: normal;
            margin-top: 2px;
        }

        .chat-box { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background-color: var(--bg-chat);
        }

        .message { 
            padding: 10px 12px; 
            border-radius: 8px; 
            max-width: 85%; 
            font-size: 14.5px;
            line-height: 1.4;
            color: var(--color-text);
            position: relative;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .bot-msg { 
            background: var(--bg-msg-bot); 
            align-self: flex-start; 
            border-top-left-radius: 0; 
        }

        .user-msg { 
            background: var(--bg-msg-user); 
            align-self: flex-end; 
            border-top-right-radius: 0; 
        }

        .message-time {
            font-size: 11px;
            color: var(--color-subtext);
            text-align: right;
            margin-top: 5px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
        }

        .user-msg .message-time {
            color: rgba(255,255,255,0.7);
        }

        .tick {
            color: var(--color-link);
            font-size: 12px;
        }

        .input-area { 
            display: flex; 
            padding: 12px 15px; 
            background: var(--bg-input);
            align-items: center;
            gap: 10px;
        }

        .menu-icon {
            color: var(--color-subtext);
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }

        input { 
            flex: 1; 
            padding: 12px 15px; 
            background: var(--bg-menu-btn);
            color: var(--color-text);
            border: none; 
            border-radius: 8px; 
            outline: none; 
            font-size: 15px;
        }

        input::placeholder {
            color: var(--color-subtext);
        }

        button.send-btn { 
            background: transparent; 
            color: var(--color-subtext); 
            border: none; 
            cursor: pointer; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            transition: color 0.2s;
        }
        
        button.send-btn:hover {
            color: var(--color-text);
        }

        .action-button {
            display: block;
            width: 100%;
            background: var(--bg-menu-btn);
            color: var(--color-green);
            border: none;
            padding: 12px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            transition: background 0.2s;
            font-size: 14.5px;
        }

        .action-button:hover {
            background: var(--bg-menu-hover);
        }

        .action-button.danger {
            color: #f15c6d;
        }
        
        a {
            color: var(--color-link);
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }

        .menu-list {
            list-style: none;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .menu-list li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .menu-list li:last-child {
            border-bottom: none;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">⚡</div>
        <div class="info">
            <span class="title">BPMSP Seguros S.A <span class="verified">✔</span></span>
            <span class="status">online</span>
        </div>
    </div>
    
    <div class="chat-box" id="chatBox">
        <!-- Messages will be injected here -->
    </div>
    
    <div class="input-area">
        <div class="menu-icon" onclick="openMenuOptions()">☰</div>
        <input type="text" id="userInput" placeholder="Digite uma mensagem" onkeypress="handleEnter(event)">
        <button class="send-btn" onclick="enviarMensagem()">🎤</button>
    </div>

    <div class="menu-panel" id="menuPanel">
        <div class="menu-panel-header">
            <span>☰ Menu de Opções</span>
            <span class="close-menu-btn" onclick="closeMenuOptions()">✕</span>
        </div>
        <div class="menu-panel-content">
            <div class="menu-option" onclick="selectMenuOption('1', 'Assistência 24h')">
                <span class="menu-option-num">1.</span>
                <span>Assistência 24h</span>
            </div>
            <div class="menu-option" onclick="selectMenuOption('2', 'Aviso de Sinistro')">
                <span class="menu-option-num">2.</span>
                <span>Aviso de Sinistro</span>
            </div>
            <div class="menu-option" onclick="selectMenuOption('3', 'Coberturas e Franquia')">
                <span class="menu-option-num">3.</span>
                <span>Coberturas e Franquia</span>
            </div>
            <div class="menu-option" onclick="selectMenuOption('4', 'Cotação de Seguro')">
                <span class="menu-option-num">4.</span>
                <span>Cotação de Seguro</span>
            </div>
            <div class="menu-option" onclick="selectMenuOption('5', 'Carro Reserva')">
                <span class="menu-option-num">5.</span>
                <span>Carro Reserva</span>
            </div>
            <div class="menu-option" onclick="selectMenuOption('6', 'Financeiro')">
                <span class="menu-option-num">6.</span>
                <span>Financeiro</span>
            </div>
            <div class="menu-option" onclick="selectMenuOption('7', 'Falar com Atendente')">
                <span class="menu-option-num">7.</span>
                <span>Falar com Atendente</span>
            </div>
        </div>
    </div>
</div>

<script>
    let currentState = 'CONSENT';

    function getFormatedTime() {
        const now = new Date();
        return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    }

    function focusInput() {
        document.getElementById('userInput').focus();
    }

    function adicionarMensagem(texto, classe, isHtml = false, id = null) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${classe}`;
        if (id) msgDiv.id = id;
        
        const contentDiv = document.createElement('div');
        if (isHtml) {
            contentDiv.innerHTML = texto;
        } else {
            contentDiv.textContent = texto;
            // Basic formatting for bold text using *
            contentDiv.innerHTML = contentDiv.innerHTML.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
            // Line breaks
            contentDiv.innerHTML = contentDiv.innerHTML.replace(/\n/g, '<br>');
        }
        
        msgDiv.appendChild(contentDiv);

        const timeDiv = document.createElement('div');
        timeDiv.className = 'message-time';
        timeDiv.innerHTML = `${getFormatedTime()} ${classe === 'user-msg' ? '<span class="tick">✔✔</span>' : ''}`;
        msgDiv.appendChild(timeDiv);

        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function startFlow() {
        const welcomeMsg = `Olá! 👋 Eu sou o assistente virtual da BPMSP Seguros Auto, e estou aqui para garantir que você rode tranquilo. 🚗<br><br>Antes de começar, preciso que você me diga se está de acordo com a nossa Política de Privacidade e Uso de Dados, que garante a segurança das informações da sua apólice. Ela está disponível neste link: <a href="https://lgpd.bpmsp.com.br" target="_blank">https://lgpd.bpmsp.com.br</a><br>
        <button class="action-button" onclick="handleConsent(true)">✅ Estou de acordo</button>
        <button class="action-button danger" onclick="handleConsent(false)">❌ Encerrar atendimento</button>`;
        adicionarMensagem(welcomeMsg, 'bot-msg', true);
    }

    function handleConsent(agrees) {
        // Remove buttons from previous message to prevent duplicate clicks
        const buttons = document.querySelectorAll('.action-button');
        buttons.forEach(btn => btn.style.display = 'none');

        if (agrees) {
            adicionarMensagem('Estou de acordo', 'user-msg');
            setTimeout(showMenu, 600);
        } else {
            adicionarMensagem('Encerrar atendimento', 'user-msg');
            setTimeout(() => {
                adicionarMensagem('Atendimento encerrado. Recarregue a página se desejar recomeçar.', 'bot-msg');
                document.getElementById('userInput').disabled = true;
            }, 600);
        }
    }

    function showMenu() {
        currentState = 'MENU';
        const menuMsg = `📢 *Fique atento!*<br>Em caso de acidente com vítimas, acione imediatamente o resgate (192) ou a polícia (190) antes de iniciar seu atendimento por aqui.<br><br>Sobre o que você quer falar? Digite a sua dúvida de forma breve ou selecione uma opção do menu: 👇<br>
        <ul class="menu-list">
            <li>1. 🛞 Assistência 24h</li>
            <li>2. 💥 Aviso de Sinistro</li>
            <li>3. 🛡️ Coberturas e Franquia</li>
            <li>4. 📝 Cotação de Seguro</li>
            <li>5. 🚘 Carro Reserva</li>
            <li>6. 📄 Financeiro</li>
            <li>7. 👨‍💻 Falar com Atendente</li>
        </ul>
        <button class="action-button" onclick="openMenuOptions()">📄 Abrir Menu</button>`;
        adicionarMensagem(menuMsg, 'bot-msg', true);
    }

    function openMenuOptions() {
        document.getElementById('menuPanel').classList.add('open');
    }

    function closeMenuOptions() {
        document.getElementById('menuPanel').classList.remove('open');
    }

    function selectMenuOption(num, text) {
        closeMenuOptions();
        const input = document.getElementById('userInput');
        input.value = text;
        enviarMensagem();
    }

    function handleRouting(input) {
        currentState = 'IDENTIFICATION';
        const routingMsg = `Certo! Para eu consultar o sistema da sua seguradora e te informar exatamente como funciona a sua cobertura de perda total ou o valor da sua franquia, vou precisar te identificar.<br><br>Por favor, digite o *CPF ou CNPJ* do titular do seguro, ou o *Número da Apólice* (usando só números, sem pontos ou traços).`;
        setTimeout(() => {
            adicionarMensagem(routingMsg, 'bot-msg', true);
            document.getElementById('userInput').placeholder = "Digite CPF, CNPJ ou Apólice";
        }, 800);
    }

    async function handleApiCall(mensagem) {
        adicionarMensagem('<em>Digitando...</em>', 'bot-msg', true, 'loading-msg');

        try {
            const resposta = await fetch('/api/perguntar/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pergunta: mensagem })
            });
            
            const dados = await resposta.json();
            const loadingMsg = document.getElementById('loading-msg');
            if (loadingMsg) loadingMsg.remove();

            if (resposta.ok) {
                adicionarMensagem(dados.resposta, 'bot-msg');
            } else {
                adicionarMensagem('Erro do Servidor: ' + dados.erro, 'bot-msg');
            }
        } catch (erro) {
            const loadingMsg = document.getElementById('loading-msg');
            if (loadingMsg) loadingMsg.remove();
            adicionarMensagem('Falha crítica de conexão com a API.', 'bot-msg');
        }
    }

    function enviarMensagem() {
        const input = document.getElementById('userInput');
        const mensagem = input.value.trim();
        if (!mensagem) return;

        adicionarMensagem(mensagem, 'user-msg');
        input.value = '';

        if (currentState === 'MENU') {
            handleRouting(mensagem);
        } else if (currentState === 'IDENTIFICATION') {
            currentState = 'CHAT';
            setTimeout(() => {
                // Here we transition to the actual API call loop. 
                // We acknowledge the identification in this specific flow.
                adicionarMensagem('Obrigado! Identificamos o seu cadastro. Aguarde um instante...', 'bot-msg');
                input.placeholder = "Digite uma mensagem";
                setTimeout(() => handleApiCall("A partir de agora responda como assistente para: " + mensagem), 1000);
            }, 800);
        } else if (currentState === 'CHAT') {
            handleApiCall(mensagem);
        }
    }

    function handleEnter(e) { 
        if (e.key === 'Enter') enviarMensagem(); 
    }

    // Initialize the flow
    window.onload = startFlow;
</script>

</body>
</html>
